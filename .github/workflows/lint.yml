# Quality gate — mirrors the team base repo's linter workflow, scoped to the
# frontend (this repo has no PHP side yet; Pint/Pest join when Laravel does).
name: linter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Lint Frontend
        run: npm run lint:check

      - name: Build
        run: npm run build
